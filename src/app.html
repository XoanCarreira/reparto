<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Reparto - Sistema de gestión de entregas para empresas y clientes" />
		<meta name="theme-color" content="#2563eb" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Reparto" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		%sveltekit.head%
		<style>
			@import 'https://cdn.jsdelivr.net/npm/tailwindcss@3.3.0/tailwind.min.css';

			/* Variables CSS globales */
			:root {
				--color-primary: #2563eb;
				--color-success: #16a34a;
				--color-warning: #ea580c;
				--color-danger: #dc2626;
				--color-gray-light: #f9fafb;
				--color-gray-dark: #1f2937;
			}

			/* Estilos globales */
			html {
				scroll-behavior: smooth;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue',
					Arial, sans-serif;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				background-color: #f9fafb;
				color: #1f2937;
			}

			/* Scrollbar personalizado */
			::-webkit-scrollbar {
				width: 8px;
				height: 8px;
			}

			::-webkit-scrollbar-track {
				background: #f1f5f9;
			}

			::-webkit-scrollbar-thumb {
				background: #cbd5e1;
				border-radius: 4px;
			}

			::-webkit-scrollbar-thumb:hover {
				background: #94a3b8;
			}

			/* Animaciones */
			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@keyframes slideInLeft {
				from {
					opacity: 0;
					transform: translateX(-20px);
				}
				to {
					opacity: 1;
					transform: translateX(0);
				}
			}

			@keyframes slideInRight {
				from {
					opacity: 0;
					transform: translateX(20px);
				}
				to {
					opacity: 1;
					transform: translateX(0);
				}
			}

			.animate-fadeIn {
				animation: fadeIn 0.5s ease-in-out;
			}

			.animate-slideInLeft {
				animation: slideInLeft 0.5s ease-in-out 0.2s both;
			}

			.animate-slideInRight {
				animation: slideInRight 0.5s ease-in-out 0.2s both;
			}

			/* Transiciones suaves */
			.transition-smooth {
				transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			}

			/* Sombras */
			.shadow-soft {
				box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
			}

			.shadow-md-soft {
				box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
			}

			/* Selectores personalizados */
			input[type='number']::-webkit-inner-spin-button,
			input[type='number']::-webkit-outer-spin-button {
				-webkit-appearance: none;
				margin: 0;
			}

			input[type='number'] {
				-moz-appearance: textfield;
			}

			/* Placeholder styling */
			::placeholder {
				color: #9ca3af;
			}

			/* Focus visible para accesibilidad */
			*:focus-visible {
				outline: 2px solid var(--color-primary);
				outline-offset: 2px;
			}

			/* Botones accesibles */
			button {
				font-family: inherit;
				cursor: pointer;
			}

			/* Transiciones para estados */
			a,
			button,
			input,
			textarea,
			select {
				transition: all 0.2s ease;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
