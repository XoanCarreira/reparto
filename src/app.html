<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Reparto - Sistema de gestión de entregas para empresas y clientes" />
		<meta name="theme-color" content="#1e1e1e" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
		<meta name="apple-mobile-web-app-title" content="Reparto" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		%sveltekit.head%
		<style>
			@import 'https://cdn.jsdelivr.net/npm/tailwindcss@3.3.0/tailwind.min.css';

			/* Variables CSS globales - Tema Oscuro VS Code */
			:root {
				--bg-primary: #1e1e1e;
				--bg-secondary: #252526;
				--bg-tertiary: #2d2d30;
				--bg-hover: #3e3e42;
				--text-primary: #e0e0e0;
				--text-secondary: #858585;
				--text-tertiary: #6a6a6a;
				--border-color: #3e3e42;
				--color-primary: #007acc;
				--color-primary-light: #0098ff;
				--color-success: #4ec9b0;
				--color-warning: #dcdcaa;
				--color-danger: #f48771;
				--color-info: #4fc1ff;
			}

			/* Estilos globales */
			html, body {
				margin: 0;
				padding: 0;
			}

			html {
				scroll-behavior: smooth;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Monaco', 'Courier New', monospace;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				background-color: var(--bg-primary);
				color: var(--text-primary);
				font-size: 13px;
			}

			/* Scrollbar personalizado - Tema oscuro */
			::-webkit-scrollbar {
				width: 12px;
				height: 12px;
			}

			::-webkit-scrollbar-track {
				background: var(--bg-primary);
			}

			::-webkit-scrollbar-thumb {
				background: var(--bg-tertiary);
				border-radius: 6px;
				border: 3px solid var(--bg-primary);
			}

			::-webkit-scrollbar-thumb:hover {
				background: var(--bg-hover);
			}

			/* Animaciones */
			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@keyframes slideInLeft {
				from {
					opacity: 0;
					transform: translateX(-20px);
				}
				to {
					opacity: 1;
					transform: translateX(0);
				}
			}

			@keyframes slideInRight {
				from {
					opacity: 0;
					transform: translateX(20px);
				}
				to {
					opacity: 1;
					transform: translateX(0);
				}
			}

			@keyframes slideInDown {
				from {
					opacity: 0;
					transform: translateY(-10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.animate-fadeIn {
				animation: fadeIn 0.5s ease-in-out;
			}

			.animate-slideInLeft {
				animation: slideInLeft 0.5s ease-in-out 0.2s both;
			}

			.animate-slideInRight {
				animation: slideInRight 0.4s ease-out;
			}

			.animate-slideInDown {
				animation: slideInDown 0.3s ease-out;
			}

			/* Transiciones suaves */
			.transition-smooth {
				transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			}

			/* Sombras oscuras VS Code */
			.shadow-soft {
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
			}

			.shadow-md-soft {
				box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
			}

			.shadow-lg-soft {
				box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.6);
			}

			/* Selectores personalizados */
			input[type='number']::-webkit-inner-spin-button,
			input[type='number']::-webkit-outer-spin-button {
				-webkit-appearance: none;
				margin: 0;
			}

			input[type='number'] {
				-moz-appearance: textfield;
			}

			/* Placeholder styling */
			::placeholder {
				color: var(--text-secondary);
			}

			/* Inputs y textareas */
			input, textarea, select {
				background-color: var(--bg-secondary);
				color: var(--text-primary);
				border: 1px solid var(--border-color);
				border-radius: 0.375rem;
			}

			input:hover, textarea:hover, select:hover {
				border-color: var(--bg-hover);
			}

			input:focus, textarea:focus, select:focus {
				outline: none;
				border-color: var(--color-primary);
				box-shadow: 0 0 0 3px rgba(0, 122, 204, 0.1);
			}

			/* Focus visible para accesibilidad */
			*:focus-visible {
				outline: 2px solid var(--color-primary);
				outline-offset: 2px;
			}

			/* Botones accesibles */
			button {
				font-family: inherit;
				cursor: pointer;
			}

			/* Links */
			a {
				color: var(--color-primary-light);
				text-decoration: none;
				transition: color 0.2s ease;
			}

			a:hover {
				color: var(--color-primary);
			}

			/* Transiciones para estados */
			a,
			button,
			input,
			textarea,
			select {
				transition: all 0.2s ease;
			}

			/* Tablas */
			table {
				border-collapse: collapse;
			}

			tr {
				border-bottom: 1px solid var(--border-color);
			}

			th {
				background-color: var(--bg-secondary);
				color: var(--text-primary);
				font-weight: 600;
				padding: 0.75rem;
				text-align: left;
			}

			td {
				padding: 0.75rem;
				color: var(--text-primary);
			}

			/* Responsive mobile */
			@media (max-width: 640px) {
				body {
					font-size: 14px;
				}
			}

			/* Spacing y padding globales mejorados */
			main {
				padding: 2rem 1rem;
			}

			@media (min-width: 640px) {
				main {
					padding: 2rem 1.5rem;
				}
			}

			@media (min-width: 1024px) {
				main {
					padding: 2.5rem 2rem;
				}
			}

			/* Mejorar espaciado en cards y contenedores */
			.space-y-6 > * + * {
				margin-top: 1.5rem;
			}

			.space-y-8 > * + * {
				margin-top: 2rem;
			}

			.space-y-10 > * + * {
				margin-top: 2.5rem;
			}

			/* Mejorar gap en grillas */
			.gap-4 {
				gap: 1.25rem;
			}

			.gap-6 {
				gap: 1.75rem;
			}

			.gap-8 {
				gap: 2.5rem;
			}

			/* Utilidades visuales robustas (no dependen de clases dinamicas de Tailwind) */
			@media (min-width: 1280px) {
				.full-width-desktop {
					width: 100%;
					position: static;
					left: auto;
					transform: none;
					padding-left: 0;
					padding-right: 0;
				}
			}

			@media (min-width: 1536px) {
				.full-width-desktop {
					padding-left: 0;
					padding-right: 0;
				}
			}

			.panel-surface {
				background: #2c2c2c !important;
				border: 2px solid #ffffff !important;
				box-shadow: 0 16px 30px rgba(0, 0, 0, 0.45) !important;
				padding: 0.4rem;
			}

			.panel-surface-soft {
				background: #2c2c2c !important;
				border: 0 !important;
				box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35) !important;
				padding: 0.75rem;
			}

			.glass-blue,
			.glass-emerald,
			.glass-red,
			.glass-violet,
			.glass-cyan,
			.glass-slate,
			.glass-rose,
			.glass-amber {
				background: #2c2c2c !important;
				border: 2px solid #ffffff !important;
				box-shadow: 0 16px 30px rgba(0, 0, 0, 0.45) !important;
				padding: 0.4rem;
			}

			.page-root {
				display: grid;
				gap: 2rem;
			}

			.page-header {
				margin-bottom: 1rem;
			}

			.page-title {
				margin: 0;
				font-size: 2.25rem;
				line-height: 1.1;
				font-weight: 700;
				color: #f1f5f9;
			}

			.page-subtitle {
				margin: 0.75rem 0 0;
				font-size: 1.125rem;
				color: #94a3b8;
			}

			.page-header-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 1rem;
			}

			/* Semantic style tokens used across routes (CSS-first replacement) */
			.txt-primary {
				color: #f1f5f9;
			}

			.txt-subtle {
				color: #e2e8f0;
			}

			.txt-soft {
				color: #cbd5e1;
			}

			.txt-muted {
				color: #94a3b8;
			}

			.bg-panel {
				background: #1e293b;
			}

			.bg-panel-soft {
				background: #334155;
			}

			.bd-soft {
				border-color: #475569;
			}

			.bd-mid {
				border-color: #334155;
			}

			.bd-strong {
				border-color: #1e293b;
			}

			.radius-lg {
				border-radius: 0.5rem;
			}

			.radius-xl {
				border-radius: 0.75rem;
			}

			.radius-full {
				border-radius: 999px;
			}

			.fw-medium {
				font-weight: 500;
			}

			.fw-semibold {
				font-weight: 600;
			}

			.fw-bold {
				font-weight: 700;
			}

			.fs-sm {
				font-size: 0.875rem;
			}

			.fs-lg {
				font-size: 1.125rem;
			}

			.fs-xl {
				font-size: 1.25rem;
			}

			.fs-2xl {
				font-size: 1.5rem;
			}

			.fs-3xl {
				font-size: 1.875rem;
			}

			.fs-4xl {
				font-size: 2.25rem;
			}

			.fs-5xl {
				font-size: 3rem;
			}

			/* Visual bridge for remaining legacy utility-like tokens */
			.text-center {
				text-align: center;
			}

			.text-left {
				text-align: left;
			}

			.text-right {
				text-align: right;
			}

			.text-xs {
				font-size: 0.75rem;
			}

			.rounded {
				border-radius: 0.25rem;
			}

			.border-b {
				border-bottom: 1px solid;
			}

			.border-b-2 {
				border-bottom: 2px solid;
			}

			.border-t {
				border-top: 1px solid;
			}

			.bg-slate-900\/40 {
				background: rgba(15, 23, 42, 0.4);
			}

			.bg-panel-soft\/50 {
				background: rgba(51, 65, 85, 0.5);
			}

			.bg-panel-soft\/30 {
				background: rgba(51, 65, 85, 0.3);
			}

			.bg-black\/60 {
				background: rgba(0, 0, 0, 0.6);
			}

			.text-white {
				color: #fff;
			}

			.text-blue-900 { color: #1e3a8a; }
			.text-blue-700 { color: #1d4ed8; }
			.text-blue-600 { color: #2563eb; }
			.text-blue-400 { color: #60a5fa; }
			.text-blue-300 { color: #93c5fd; }
			.text-blue-200 { color: #bfdbfe; }
			.text-green-800 { color: #166534; }
			.text-green-700 { color: #15803d; }
			.text-green-600 { color: #16a34a; }
			.text-green-400 { color: #4ade80; }
			.text-emerald-400 { color: #34d399; }
			.text-emerald-300 { color: #6ee7b7; }
			.text-red-800 { color: #991b1b; }
			.text-red-700 { color: #b91c1c; }
			.text-red-300 { color: #fca5a5; }
			.text-yellow-800 { color: #854d0e; }
			.text-yellow-600 { color: #ca8a04; }
			.text-yellow-400 { color: #facc15; }
			.text-purple-600 { color: #9333ea; }
			.text-violet-300 { color: #c4b5fd; }
			.text-violet-300\/80 { color: rgba(196, 181, 253, 0.8); }
			.text-violet-200 { color: #ddd6fe; }
			.text-amber-300 { color: #fcd34d; }
			.text-amber-200 { color: #fde68a; }

			.bg-blue-600 { background: #2563eb; }
			.bg-green-600 { background: #16a34a; }
			.bg-green-500 { background: #22c55e; }
			.bg-emerald-600 { background: #059669; }
			.bg-red-600 { background: #dc2626; }
			.bg-red-500 { background: #ef4444; }
			.bg-yellow-500 { background: #eab308; }
			.bg-green-100 { background: #dcfce7; }
			.bg-red-100 { background: #fee2e2; }
			.bg-yellow-100 { background: #fef9c3; }

			.hover\:bg-blue-700:hover { background: #1d4ed8; }
			.hover\:bg-green-700:hover { background: #15803d; }
			.hover\:bg-emerald-700:hover { background: #047857; }
			.hover\:bg-red-700:hover { background: #b91c1c; }
			.hover\:bg-red-200:hover { background: #fecaca; }
			.hover\:bg-green-200:hover { background: #bbf7d0; }
			.hover\:bg-panel-soft:hover { background: #334155; }
			.hover\:bg-panel-soft\/70:hover { background: rgba(51, 65, 85, 0.7); }
			.hover\:bg-panel-soft\/55:hover { background: rgba(51, 65, 85, 0.55); }
			.hover\:bg-panel-soft\/50:hover { background: rgba(51, 65, 85, 0.5); }
			.hover\:bg-panel\/40:hover { background: rgba(30, 41, 59, 0.4); }
			.hover\:bg-panel\/30:hover { background: rgba(30, 41, 59, 0.3); }
			.hover\:text-blue-800:hover { color: #1e40af; }

			@media (max-width: 639px) {
				.page-title {
					font-size: 1.875rem;
				}

				.page-subtitle {
					font-size: 1rem;
				}

				.page-header-row {
					align-items: flex-start;
					flex-direction: column;
				}
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
